<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Web Projects</title>

<style>

/* Page styling */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    text-align: center;
}

/* Title */
h1 {
    color: #00ff88;
    margin-bottom: 30px;
}

/* Card buttons */
.card {
    background: #0f1220;
    padding: 20px;
    margin: 15px;
    border-radius: 10px;
    box-shadow: 0 0 15px #00ff88;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Links */
a {
    text-decoration: none;
    color: white;
    font-size: 18px;
}

</style>
</head>
