<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>

<style>
/* ========================================================= */
/* Step 7: Style body and heading                            */
/* ========================================================= */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #05070f, #0a0a14);
    color: #c8d0e0;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

/* ========================================================= */
/* Main container                                            */
/* ========================================================= */
.container {
    width: 500px;
    padding: 25px;
    background: #0f1220;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
}

/* ========================================================= */
/* Title                                                     */
/* ========================================================= */
h2 {
    text-align: center;
    color: #00ff88;
    letter-spacing: 2px;
}

h3 {
    margin-top: 30px;
    font-size: 1.1rem;
    color: #00ff88;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
}

/* ========================================================= */
/* Step 8: Options box                                       */
/* ========================================================= */
.options {
    margin-top: 20px;
}

.options label {
    display: block;
    margin: 8px 0;
    font-size: 14px;
}

/* ========================================================= */
/* Inputs                                                    */
/* ========================================================= */
input[type="number"] {
    width: 50px;
    padding: 5px;
    margin-left: 10px;
    background: #05070f;
    border: 1px solid #00ff88;
    color: #00ff88;
    border-radius: 6px;
    outline: none;
}

input[type="checkbox"] {
    accent-color: #00ff88;
    margin-right: 6px;
    cursor: pointer;
}

/* ========================================================= */
/* Step 9: Buttons                                           */
/* ========================================================= */
.buttons {
    margin: 15px 0;
}

button {
    padding: 10px 15px;
    margin-right: 5px;
    background: #00ff88;
    color: black;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background: #00cc66;
    box-shadow: 0 0 10px #00ff88;
}

#clearBtn {
    background: #ff4444;
    color: white;
}

/* ========================================================= */
/* Step 10: Output area (terminal style)                     */
/* ========================================================= */
.output {
    margin-top: 10px;
    padding: 15px;
    background: #05070f;
    border: 1px solid #00ff88;
    border-radius: 8px;
    color: #00ff88;
    font-family: monospace;
    font-size: 16px;
    word-break: break-all;
    min-height: 20px;
}

/* ========================================================= */
/* Step 11: Strength text                                    */
/* ========================================================= */
.strength {
    margin-top: 10px;
    font-weight: bold;
}

.strength.weak { color: #ff4444; }
.strength.medium { color: orange; }
.strength.strong { color: #00ff88; }

/* ========================================================= */
/* 🔥 Strength bar                                           */
/* ========================================================= */
#strengthBar {
    height: 6px;
    width: 0%;
    background: red;
    border-radius: 5px;
    margin-top: 5px;
    transition: 0.4s ease;
}

/* ========================================================= */
/* 🔥 Saved passwords section                                */
/* ========================================================= */
#savedList {
    margin-top: 10px;
    background: #05070f;
    border: 1px solid #333;
    padding: 10px;
    border-radius: 8px;
    font-family: monospace;
    color: #888;
    max-height: 150px;
    overflow-y: auto;
    white-space: pre-wrap; /* Keeps line breaks */
}

/* Scrollbar */
#savedList::-webkit-scrollbar {
    width: 6px;
}

#savedList::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>PASSWORD GENERATOR</h2>

    <div class="options">
        <label>Length: <input type="number" id="passwordLength" value="12"></label>
        <label>Quantity: <input type="number" id="count" value="1"></label>

        <label><input type="checkbox" id="includeUppercase"> Uppercase</label>
        <label><input type="checkbox" id="includeLowercase" checked> Lowercase</label>
        <label><input type="checkbox" id="includeNumbers"> Numbers</label>
        <label><input type="checkbox" id="includeSymbols"> Symbols</label>
    </div>

    <div class="buttons">
        <button id="generateBtn">Generate</button>
        <button id="copyBtn">Copy</button>
        <button id="saveBtn">DL .txt</button>
        <button id="clearBtn">Clear</button>
    </div>

    <div class="output" id="passwordOutput">Result will appear here...</div>
    <div class="strength" id="passwordStrength">Strength: -</div>
    <div id="strengthBar"></div>

    <h3>History</h3>
    <div id="savedList">No saved passwords yet.</div>
</div>

<script>
// Step 12: Character sets
const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lower = "abcdefghijklmnopqrstuvwxyz";
const numbers = "0123456789";
const symbols = "!@#$%^&*()_+";

// Step 13: Generate password
function generatePassword() {
    let length = document.getElementById("passwordLength").value;
    let count = document.getElementById("count").value;

    let pool = "";
    if (document.getElementById("includeUppercase").checked) pool += upper;
    if (document.getElementById("includeLowercase").checked) pool += lower;
    if (document.getElementById("includeNumbers").checked) pool += numbers;
    if (document.getElementById("includeSymbols").checked) pool += symbols;

    if (pool === "") {
        alert("Select at least one option");
        return;
    }

    let result = "";
    let lastPass = ""; // For strength check

    for (let j = 0; j < count; j++) {
        let pass = "";
        for (let i = 0; i < length; i++) {
            pass += pool[Math.floor(Math.random() * pool.length)];
        }
        result += pass + "\n";
        lastPass = pass; 
    }

    // Display output
    const outputEl = document.getElementById("passwordOutput");
    outputEl.innerText = result.trim();
    
    // Check strength of the last generated pass
    checkStrength(lastPass);
    
    // Auto-save to the History list
    saveOnSite(result.trim());
}

// Step 14: Strength check
function checkStrength(pw) {
    let strength = "Weak";
    if (pw.length > 12 && /[A-Z]/.test(pw) && /\d/.test(pw) && /[!@#$]/.test(pw)) {
        strength = "Strong";
    } else if (pw.length >= 8) {
        strength = "Medium";
    }

    let el = document.getElementById("passwordStrength");
    el.innerText = "Strength: " + strength;
    el.className = "strength " + strength.toLowerCase();
    
    updateStrengthBar(strength);
}

function updateStrengthBar(strength) {
    let bar = document.getElementById("strengthBar");
    if (strength === "Weak") {
        bar.style.width = "30%";
        bar.style.background = "#ff4444";
    } else if (strength === "Medium") {
        bar.style.width = "60%";
        bar.style.background = "orange";
    } else {
        bar.style.width = "100%";
        bar.style.background = "#00ff88";
    }
}

// Step 16: Save to file (.txt)
document.getElementById("saveBtn").onclick = function() {
    let data = document.getElementById("passwordOutput").innerText;
    if(!data || data.includes("appear here")) return;
    
    let blob = new Blob([data], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "passwords.txt";
    a.click();
};

// Copy to clipboard
document.getElementById("copyBtn").onclick = function() {
    let text = document.getElementById("passwordOutput").innerText;
    if (!text || text.includes("appear here")) return;
    navigator.clipboard.writeText(text);
    alert("Copied!");
};

// STEP: Save on website (localStorage)
function saveOnSite(passwords) {
    let saved = localStorage.getItem("passwords") || "";
    // Put new ones at the top
    saved = passwords + "\n---\n" + saved;
    localStorage.setItem("passwords", saved);
    showSaved();
}

// STEP: Show saved passwords
function showSaved() {
    let data = localStorage.getItem("passwords");
    const list = document.getElementById("savedList");
    list.innerText = data ? data : "No saved passwords yet.";
}

// Clear history
document.getElementById("clearBtn").onclick = function() {
    localStorage.removeItem("passwords");
    showSaved();
};

document.getElementById("generateBtn").onclick = generatePassword;

// Load saved on start
window.onload = showSaved;
</script>

</body>
</html>
